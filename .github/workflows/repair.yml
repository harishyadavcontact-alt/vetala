name: Repair Queue

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  open-repair-pr:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      - name: Create repair report
        run: |
          mkdir -p .github/repair-reports
          cat <<EOF > .github/repair-reports/run-${{ github.event.workflow_run.id }}.md
          # Repair Report

          - Workflow: ${{ github.event.workflow_run.name }}
          - Run ID: ${{ github.event.workflow_run.id }}
          - Branch: ${{ github.event.workflow_run.head_branch }}
          - SHA: ${{ github.event.workflow_run.head_sha }}
          - Conclusion: ${{ github.event.workflow_run.conclusion }}
          - URL: ${{ github.event.workflow_run.html_url }}

          ## Required Follow-up

          - Reproduce the failing CI job locally with \`npm run validate\`
          - Add or update tests before modifying behavior
          - Keep the repair PR draft until all gates pass
          EOF

      - uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: open repair report for failed CI run"
          title: "Repair: CI failure for run ${{ github.event.workflow_run.id }}"
          body: |
            This draft PR was opened automatically because the CI workflow failed.

            Review the attached repair report and push the actual fix onto this branch.

            - Run: ${{ github.event.workflow_run.html_url }}
            - SHA: ${{ github.event.workflow_run.head_sha }}
          branch: codex/repair-run-${{ github.event.workflow_run.id }}
          delete-branch: true
          draft: true
